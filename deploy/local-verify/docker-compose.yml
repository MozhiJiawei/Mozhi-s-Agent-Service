services:
  edge:
    image: ${EDGE_IMAGE:-mozhi-agent-service-edge:local}
    container_name: mozhi-edge-local
    environment:
      FRP_TOKEN: ${FRP_TOKEN:-local-dev-token}
      FRP_BIND_PORT: 7000
      HEALTH_PROXY_PORT: 18081
      CADDY_HTTP_SITE_ADDRESS: ":80"
      CADDY_HTTPS_SITE_ADDRESS: "https://localhost"
      CADDY_DEFAULT_SNI: "localhost"
      CADDY_TLS_MODE: "internal"
      ALLOW_HTTP_API: ${ALLOW_HTTP_API:-false}
      API_MAX_BODY_SIZE: ${API_MAX_BODY_SIZE:-1MB}
    ports:
      - "18080:80"
      - "18443:443"
      - "7000:7000"
      - "18081:18081"
